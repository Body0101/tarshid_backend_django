{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<!--
  Tarshid IoT Building Management System
  User Dashboard
  Author: Abdulrahman Saber
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarshid IoT - Dashboard</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full flex flex-col font-sans">

    <!-- Header Navigation -->
    <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between shrink-0 shadow-md">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white leading-tight">Tarshid IoT</h1>
                <p class="text-xs text-indigo-400 font-semibold">User Dashboard</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <span class="text-sm font-medium text-slate-300 animate-fade-in" id="user-display">Welcome, User</span>
            <button id="logout-btn"
                class="flex items-center space-x-1.5 px-3 py-1.5 rounded-lg bg-red-950/20 hover:bg-red-950/40 text-red-400 border border-red-500/10 hover:border-red-500/30 text-xs font-semibold transition duration-200">
                <span>Log Out</span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 bg-slate-950 p-8 overflow-y-auto">
        <div class="w-full max-w-6xl mx-auto mb-6">
            <h2 class="text-xl font-extrabold text-white tracking-tight">Assigned Devices</h2>
            <p class="text-xs text-slate-400">Live monitoring and operational status of your assigned ESP nodes. Control verified by Abdulrahman Saber.</p>
        </div>
        
        <!-- Wide container for devices-grid -->
        <div id="devices-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-6xl mx-auto"></div>
    </main>

    <!-- Load API and Dashboard Scripts -->
    <script src="{% static 'accounts/js/api.js' %}"></script>
    <script src="{% static 'accounts/js/dashboard.js' %}"></script>
</body>
</html>
